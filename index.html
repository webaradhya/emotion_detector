
<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
</head>
<body>

<h2>Emotion Detector</h2>

<form method="POST">
    <textarea name="text" rows="4" cols="50"></textarea><br><br>
    <button type="submit">Analyze</button>
</form>

{% if result %}
    {% if result.error %}
        <p style="color:red">{{ result.error }}</p>
    {% else %}
        <h3>Dominant Emotion: {{ result.dominant_emotion }}</h3>
        <pre>{{ result.emotions }}</pre>
    {% endif %}
{% endif %}

</body>
</html>
